<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N1学习计划 · Phase 1</title>
<style>:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-light: #3b82f6;
  --primary-subtle: #eff6ff;
  --accent-green: #16a34a;
  --accent-green-bg: #f0fdf4;
  --yellow: #f59e0b;
  --yellow-bg: #fffbeb;
  --yellow-border: #fbbf24;
  --text: #1e293b;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;padding:1.25rem;min-height:100vh
}
.container{max-width:1100px;margin:0 auto}

header{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:1.25rem 1.5rem;margin-bottom:1rem;
  display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:.75rem
}
header h1{font-size:1.15rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
header h1 span{color:var(--primary)}
header .subtitle{font-size:.8rem;color:var(--text-muted);margin-top:1px}
.header-left{display:flex;flex-direction:column;gap:2px}
.stats{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.stat{text-align:center;padding:0 .4rem}
.stat+.stat{border-left:1px solid var(--border);padding-left:.8rem}
.stat-value{font-size:1.1rem;font-weight:700;color:var(--text)}
.stat-label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.03em}
.progress-track{width:140px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:2px;transition:width .5s ease}
.reset-btn{
  background:var(--border);border:none;color:var(--text-muted);padding:.3rem .7rem;
  border-radius:var(--radius-sm);cursor:pointer;font-size:.7rem;transition:all .15s;
  font-family:inherit
}
.reset-btn:hover{background:#fee2e2;color:#dc2626}

.week-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  margin-bottom:.75rem;overflow:hidden;transition:box-shadow .2s
}
.week-card:hover{box-shadow:var(--shadow-hover)}
.week-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:.7rem 1.1rem;cursor:pointer;user-select:none;
  transition:background .15s;gap:.5rem
}
.week-header:hover{background:var(--primary-subtle)}
.week-title{font-size:.85rem;font-weight:600;color:var(--text)}
.week-title .week-tag{color:var(--primary);margin-right:.35rem}
.week-progress{font-size:.72rem;color:var(--text-muted);white-space:nowrap}
.week-header .toggle-icon{font-size:.55rem;color:var(--text-muted);transition:transform .2s;margin-left:auto}
.week-header.collapsed .toggle-icon{transform:rotate(-90deg)}
.week-body{overflow-x:auto;transition:max-height .25s ease}
.week-body.collapsed{max-height:0;overflow:hidden}

table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:620px}
thead th{
  padding:.65rem .5rem;font-weight:500;text-align:center;
  color:var(--text-secondary);border-bottom:1.5px solid var(--border);
  white-space:nowrap;font-size:.7rem;position:sticky;top:0;background:var(--card);z-index:1
}
thead th:first-child{text-align:left;padding-left:.9rem;min-width:115px;color:var(--text-muted);font-weight:400;font-size:.68rem}
thead th.date-header{padding-top:.55rem;padding-bottom:.5rem}
thead th.date-header .day-label{display:block;font-size:.82rem;font-weight:600;color:var(--text)}
thead th.date-header .date-label{display:block;font-size:.62rem;color:var(--text-muted);margin-top:0;font-weight:400}
thead th.rest-day-header{background:var(--border-light)}
thead th.rest-day-header .day-label{color:var(--text-muted)}}

/* Module label column */
tbody td{
  padding:.7rem .4rem;text-align:center;border-bottom:1px solid var(--border-light);
  vertical-align:middle;position:relative;height:130px;transition:background .1s
}
tbody td:first-child{
  text-align:left;padding-left:.9rem;font-weight:500;color:var(--text-secondary);
  border-right:1px solid var(--border-light);background:var(--card);
  position:sticky;left:0;z-index:1;font-size:.75rem;white-space:nowrap
}
tbody tr:hover td:not(:first-child){background:#f8fafc}
.module-label-row td:first-child{border-left:3px solid var(--primary)}

/* Plan bars */
.plan-cell{position:relative;cursor:pointer;transition:opacity .12s}
.plan-cell:hover{opacity:.8}
.plan-cell::before{
  content:'';position:absolute;top:10px;left:4px;right:4px;bottom:10px;
  border-radius:6px;background:var(--primary-subtle);z-index:0;transition:background .2s
}
.plan-cell .cell-content{
  position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;min-height:110px
}
.plan-cell .cell-line1{font-size:.78rem;color:var(--text);font-weight:500;line-height:1.35;word-break:break-word;display:block}
.plan-cell .cell-line2{font-size:.68rem;color:var(--text-muted);line-height:1.3;word-break:break-word;display:block;margin-top:2px}
.rest-cell{color:var(--text-muted);font-style:italic;font-size:.62rem;cursor:default}
.rest-cell::before{display:none!important}

/* Done state */
.plan-cell.done .cell-line1{color:var(--accent-green);text-decoration:line-through;opacity:.7}
.plan-cell.done .cell-line2{color:var(--accent-green);text-decoration:line-through;opacity:.6}
.plan-cell.done::before{background:var(--accent-green-bg)}
.plan-cell.done .cell-icon{color:var(--accent-green)}

/* Today highlight - full column frame */
.today-header{border-left:2.5px solid var(--yellow-border)!important;border-right:2.5px solid var(--yellow-border)!important;background:var(--yellow-bg)!important}
.today-header .day-label,.today-header .date-label{color:#92400e!important;font-weight:600!important}
.today-cell{border-left:2.5px solid var(--yellow-border)!important;border-right:2.5px solid var(--yellow-border)!important}
.today-cell .plan-cell::before{background:var(--yellow-bg)!important}

.week-summary{
  display:flex;justify-content:space-between;align-items:center;
  padding:.45rem 1.1rem;font-size:.72rem;color:var(--text-muted);
  border-top:1px solid var(--border-light)
}
.week-summary b{color:var(--primary);font-weight:600}

/* Mobile */
@media(max-width:768px){
  body{padding:.6rem}
  header{padding:1rem;flex-direction:column;align-items:flex-start;gap:.5rem}
  .stats{width:100%;justify-content:space-between}
  header h1{font-size:1rem}
  table{font-size:.7rem;min-width:480px}
  thead th{font-size:.62rem;padding:.3rem .2rem}
  thead th:first-child{min-width:75px;padding-left:.45rem;font-size:.62rem}
  tbody td:first-child{padding-left:.45rem;font-size:.68rem}
  .plan-cell .cell-text{font-size:.58rem}
  .progress-track{width:100px}
  .stat-value{font-size:.95rem}
}</style>

function key(wi, di, mi) { return "n1p1_" + wi + "_" + di + "_" + mi; }
function load(k) { try { return localStorage.getItem(k) === "1"; } catch(e) { return false; } }
function save(k, v) { try { if(v) localStorage.setItem(k,"1"); else localStorage.removeItem(k); } catch(e) {} }

function splitTask(t) {
  if (t === "休息" || t === "休息/补漏" || t === "休息/补漏+回顾" || t === "补漏") return ["", t];
  // 1. "N3 第1单元 新词20个" -> "N3 第1单元" / "新词20个"
  var m = t.match(/^(N3|N2)\s*(第[\d~,]+(?:单元|句型)?)\s+(.+?)(\d+\.?\d*)(个|篇|min|分|套|段|题)?\s*(.*)/);
  if (m) { var l1 = (m[1]||"") + (m[2]||""); var l2 = (m[3]||"") + (m[4]||"") + (m[5]||"") + (m[6]?" "+m[6]:""); return [l1, l2]; }
  // 2. "复习第X单元+第Y单元" -> "复习" / "第X单元+第Y单元"
  m = t.match(/^(复习|补漏)\s*(.+)/);
  if (m) return [m[1], m[2]];
  // 3. Split at →  
  var idx = t.indexOf("→");
  if (idx > 0 && idx < t.length-1) return [t.substring(0,idx).trim(), t.substring(idx+1).trim()];
  // 4. "内容+数字+单位" at end: "新词20个", "短文1篇", "中篇1篇"
  m = t.match(/^(.+\D)(\d+\.?\d*)(个|篇|套|段|题|分)$/);
  if (m && m[1].trim() && (m[2]+m[3]).length > 0) return [m[1].trim(), m[2]+m[3]];
  // 5. "主题 第X~Y句型" -> split at 第, keep 句型/单元
  m = t.match(/^(.+?)(第[\d~,\s]+(?:句型|单元)?)(.*)/);
  if (m) { var a = (m[1]+(m[3]||"")).trim(); if (a && m[2]) return [a, m[2].trim()]; }
  // 6. "描述XXX" -> "描述" / rest
  m = t.match(/^描述(.+)/);
  if (m) return ["描述", m[1]];
  // 7. Split at last space
  idx = t.lastIndexOf(" ");
  if (idx > 1 && idx < t.length-2) { var a = t.substring(0,idx).trim(); var b = t.substring(idx+1).trim(); if (a.length > 1) return [a, b]; }
  // 8. "内容(说明)" -> "内容" / "(说明)"
  m = t.match(/^(.+?)(\(.+\))\s*(.*)/);
  if (m) { var c = (m[1]+" "+(m[3]||"")).trim(); if (c && m[2]) return [c, m[2]]; }
  // 9. Split at action words
  var actions = ["随机抽考","本周","选1段","虚拟对话","Shadowing","日剧/YouTube","昨日错题","语法模拟","错题"];
  for (var a of actions) { idx = t.indexOf(a); if (idx > 1) return [t.substring(0,idx).trim(), t.substring(idx)]; }
  return [t, ""];
}
function render() {
  const c = document.getElementById("weeksContainer");
  c.innerHTML = "";
  let total = 0;
  const today = new Date();
  const todayStr = (today.getMonth()+1) + "/" + today.getDate();
  let currentWeekIdx = -1;

  // Find current week index
  WEEKS.forEach((wk, wi) => {
    const lastDay = wk.days[wk.days.length-1];
    const firstDay = wk.days[0];
    const lastDate = lastDay[1];
    const firstDate = firstDay[1];
    if (todayStr >= firstDate && todayStr <= lastDate) { currentWeekIdx = wi; }
  });
  if (currentWeekIdx === -1) currentWeekIdx = 0;

  WEEKS.forEach((wk, wi) => {
    const card = document.createElement("div");
    card.className = "week-card";
    const hdr = document.createElement("div");
    hdr.className = "week-header";
    hdr.innerHTML = `<span class="week-title">${wk.name}</span><span class="week-progress" id="wp_${wi}">0/35</span> <span class="toggle-icon">&#9660;</span>`;
    hdr.onclick = () => { hdr.classList.toggle("collapsed"); body.classList.toggle("collapsed"); };
    const body = document.createElement("div");
    body.className = "week-body" + (wi !== currentWeekIdx ? " collapsed" : "");

    const tbl = document.createElement("table");
    const thd = document.createElement("thead");
    const hr = document.createElement("tr");

    // Header row
    const h1 = document.createElement("th");
    h1.textContent = "学习细项";
    hr.appendChild(h1);
    wk.days.forEach((d, di) => {
      const th = document.createElement("th");
      let cls = "date-header" + (d[0] === "日" ? " rest-day-header" : "");
      if (wi === currentWeekIdx && d[1] === todayStr) cls += " today-header";
      th.className = cls;
      th.innerHTML = `<span class="day-label">${d[1]}</span><span class="date-label">周${d[0]}</span>`;
      hr.appendChild(th);
    });
    thd.appendChild(hr);
    tbl.appendChild(thd);

    const tb = document.createElement("tbody");

    // One row per module
    MODULES.forEach((mod, mi) => {
      const tr = document.createElement("tr");
      tr.className = "module-label-row " + mod.id;

      const lt = document.createElement("td");
      lt.textContent = mod.label;
      tr.appendChild(lt);

      wk.days.forEach((d, di) => {
        const td = document.createElement("td");
        const task = d[2][mi];
        const isRest = d[0] === "日" || task.includes("休息") || task === "补漏";

        if (isRest) {
          td.className = "rest-cell";
          td.innerHTML = `<span class="cell-line2">${task}</span>`;
          tr.appendChild(td);
          return;
        }

        const k = key(wi, di, mi);
        const done = load(k);
        let cellCls = "plan-cell" + (done ? " done" : "");
        if (wi === currentWeekIdx && d[1] === todayStr) cellCls += " today-cell";
        td.className = cellCls;
        var lines = splitTask(task);
        td.innerHTML = `<div class="cell-content"><span class="cell-line1">${lines[0]}</span><span class="cell-line2">${lines[1]}</span></div>`;
        td.onclick = () => {
          const nv = !load(k);
          save(k, nv);
          if (nv) {
            td.classList.add("done");
          } else {
            td.classList.remove("done");
          }
          updateStats();
        };
        tr.appendChild(td);
      });
      tb.appendChild(tr);
    });

    tbl.appendChild(tb);
    body.appendChild(tbl);

    const sum = document.createElement("div");
    sum.className = "week-summary";
    sum.innerHTML = `<span></span><span>完成 <b id="wd_${wi}" style="color:var(--primary)">0</b> / 35</span>`;
    card.appendChild(hdr);
    card.appendChild(body);
    card.appendChild(sum);
    c.appendChild(card);
  });

  updateStats();
}

function updateStats() {
  let done = 0, total = 0;
  WEEKS.forEach((wk, wi) => {
    let wd = 0;
    wk.days.forEach((d, di) => {
      MODULES.forEach((_, mi) => {
        const task = d[2][mi];
        const isRest = d[0] === "日" || task.includes("休息") || task === "补漏";
        if (isRest) return;
        total++;
        if (load(key(wi, di, mi))) { wd++; done++; }
      });
    });
    document.getElementById("wd_"+wi).textContent = wd;
    document.getElementById("wp_"+wi).textContent = wd + "/35";
  });
  document.getElementById("statDone").textContent = done;
  document.getElementById("statTotal").textContent = total;
  const p = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById("statPercent").textContent = p + "%";
  document.getElementById("overallProgress").style.width = p + "%";
}

function resetAll() {
  if (!confirm("确定重置所有进度？")) return;
  const keys = Object.keys(localStorage);
  keys.filter(k => k.startsWith("n1p1_")).forEach(k => localStorage.removeItem(k));
  render();
}

render();
</script>
